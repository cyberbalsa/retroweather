name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: JS lint and tests
        run: npm ci && npm test

      - name: Android unit tests
        run: ./gradlew test

      - name: Assemble release
        run: ./gradlew assembleRelease bundleRelease

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/keystore.jks"

      - name: Sign APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          apksigner sign \
            --ks "$RUNNER_TEMP/keystore.jks" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "env:STORE_PASSWORD" \
            --key-pass "env:KEY_PASSWORD" \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Sign AAB
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          jarsigner \
            -keystore "$RUNNER_TEMP/keystore.jks" \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -signedjar app/build/outputs/bundle/release/app-release-signed.aab \
            app/build/outputs/bundle/release/app-release.aab \
            "$KEY_ALIAS"

      - name: Verify APK signature
        run: |
          apksigner verify --verbose \
            app/build/outputs/apk/release/app-release-signed.apk

      - name: Clean up keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/keystore.jks"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG" \
            app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/bundle/release/app-release-signed.aab
